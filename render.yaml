services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: ttm-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: ttm-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        value: https://team-task-manager-1-k0yr.onrender.com/api
